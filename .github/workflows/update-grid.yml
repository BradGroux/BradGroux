name: Update Contribution Grid

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC (midnight CST)
  workflow_dispatch:       # Manual trigger

jobs:
  update-grid:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test contribution-grid safeguards
        run: bash .github/tests/test-generate-grid.sh

      - name: Generate contribution grid
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/generate-grid.sh
          bash .github/scripts/generate-grid.sh

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash .github/scripts/verify-generated-diff.sh contribution-grid.svg
          git add -- contribution-grid.svg
          bash .github/scripts/verify-generated-diff.sh contribution-grid.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update contribution grid [skip ci]"
            git push
          fi
