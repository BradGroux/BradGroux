name: Update Contribution Grid

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC (midnight CST)
  workflow_dispatch:       # Manual trigger

jobs:
  update-grid:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test contribution-grid safeguards
        run: bash .github/tests/test-generate-grid.sh

      - name: Generate contribution grid
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/generate-grid.sh
          bash .github/scripts/generate-grid.sh

      - name: Open validated grid pull request
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: automation/contribution-grid
          PUBLISH_COMMIT_MESSAGE: 'chore: update contribution grid'
          PUBLISH_PR_TITLE: 'Update contribution grid'
          PUBLISH_PR_BODY: |
            Automated update of the validated contribution grid.

            The generator validates the GraphQL response, renders atomically, and permits only `contribution-grid.svg` to change.

            This PR is never merged automatically. Approve the validation run if GitHub requests it, then review the rendered asset and required check before merging.
        run: |
          bash .github/scripts/publish-generated-pr.sh \
            contribution-grid.svg
